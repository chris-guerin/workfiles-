<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Plans — FutureBridge Advisory</title>
<style>
/* ═══════════════════════════════════════════════════
   FUTURBRIDGE ACCOUNT PLANS
   White main content · Black sidebar · Red #F84E5D accent
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --black:#000;--white:#fff;--grey:#4B4B55;--red:#F84E5D;
  --red-pale:rgba(248,78,93,.07);--red-mid:rgba(248,78,93,.2);
  --light:#f5f5f5;--mid:#ddd;--dim:#888;--dimmer:#bbb;
  --c-perf:#000;--c-strat:#4B4B55;--c-init:#777;--c-tech:#2a7abf;--c-weak:#F84E5D;
  --font-d:Georgia,'Times New Roman',serif;
  --font-b:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-m:'Courier New',Courier,monospace;
  --ease:all .2s cubic-bezier(.4,0,.2,1);
  --gap:72px;--r:3px;
}
body{font-family:var(--font-b);background:#000;color:#000;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-d);font-weight:normal}
p{color:#444;max-width:68ch}
p.wide{max-width:100%}
strong{color:#000;font-weight:600}
a{text-decoration:none}

/* ── SHELL ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:220px;flex-shrink:0;background:#080808;border-right:1px solid #1a1a1a;overflow-y:auto;display:flex;flex-direction:column}
.sb-hdr{padding:16px 14px 10px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.sb-gd{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.sb-gd span{background:#fff;display:block;height:3px;border-radius:1px}
.sb-gd span:nth-child(1){width:28px}.sb-gd span:nth-child(2){width:19px}.sb-gd span:nth-child(3){width:12px}
.sb-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff}
.sb-sub{font-size:9px;color:#444;font-family:var(--font-m);margin-top:2px}
.api-wrap{padding:10px 12px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.api-lbl{font-size:8px;color:#444;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.api-input{width:100%;background:#0f0f0f;border:1px solid #222;color:#666;font-size:10px;padding:5px 8px;font-family:var(--font-m);outline:none;border-radius:2px}
.api-input:focus{border-color:var(--red);color:#fff}
.sg-lbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#333;padding:10px 12px 3px;font-weight:700}
.si{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;transition:var(--ease)}
.si:hover{background:rgba(255,255,255,.03)}
.si.active{background:rgba(255,255,255,.05);border-left-color:var(--red)}
.si-name{font-size:12px;font-weight:700;color:#666}
.si.active .si-name{color:#fff}
.si-owner{font-size:9px;color:#333;margin-top:1px}
.sdot{width:5px;height:5px;border-radius:50%;background:#1a1a1a;flex-shrink:0}
.sdot.part{background:#444}.sdot.full{background:#4a9}

/* ── CONTENT ── */
.content-wrap{flex:1;overflow-y:auto;background:#fff}

/* ── STICKY NAV ── */
.brief-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--mid);padding:0 40px}
.brief-nav-inner{display:flex;align-items:center;justify-content:space-between;height:48px;max-width:1100px;margin:0 auto}
.brief-brand{font-family:var(--font-d);font-size:12px;color:var(--dim)}
.brief-brand span{color:var(--red)}
.nav-chain{display:flex;align-items:center}
.nn{padding:4px 8px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:var(--ease);color:var(--dim)}
.nn:hover{background:var(--red-pale)}
.nn.np{color:var(--c-perf)}.nn.ns{color:var(--c-strat)}.nn.ni{color:var(--c-init)}.nn.nt{color:var(--c-tech)}.nn.nw{color:var(--c-weak)}.nn.nc{color:var(--dim)}
.nav-arr{color:var(--dimmer);padding:0 2px;font-size:10px}

/* ── STATE ── */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:14px;color:var(--dim)}
.spin{width:26px;height:26px;border:2px solid var(--mid);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{font-size:13px}.state-sub{font-size:10px;color:var(--dimmer);font-family:var(--font-m)}

/* ── HERO ── */
#hero{padding:80px 0 48px;border-bottom:3px solid var(--black)}
.hero-eye{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hero-eye-line{width:24px;height:1px;background:var(--red)}
.lbl-r{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}
.xl{font-size:clamp(2.2rem,4vw,3.6rem);letter-spacing:-.02em;line-height:1.1;color:var(--black)}
.hero-sub{font-size:15px;color:#555;margin:16px 0 32px;max-width:54ch;line-height:1.65}
.hero-meta{display:flex;gap:32px;padding-top:18px;border-top:1px solid var(--mid);flex-wrap:wrap}
.hm-lbl{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.hm-val{font-size:13px;color:var(--black);margin-top:2px}
.regen-btn{background:var(--black);color:#fff;border:none;padding:8px 16px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;border-radius:2px;margin-left:auto;display:inline-flex;align-items:center;gap:6px}
.regen-btn:hover{background:#333}
.regen-btn:disabled{opacity:.4;pointer-events:none}

/* ── CHAIN ── */
.chain{display:flex;align-items:stretch;margin:36px 0 0;border:1px solid var(--mid);border-radius:var(--r);overflow:hidden}
.cnode{flex:1;min-width:130px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 10px 16px;background:#fafafa;border-right:1px solid var(--mid);transition:var(--ease);position:relative;cursor:default}
.cnode:last-child{border-right:none}
.cnode:hover{background:var(--light)}
.cnode:not(:last-child)::after{content:'→';position:absolute;right:-10px;top:50%;transform:translateY(-50%);color:var(--dimmer);font-size:13px;z-index:2}
.cnode-num{font-family:var(--font-m);font-size:9px;color:var(--dim);margin-bottom:7px;letter-spacing:.1em}
.cnode-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:14px}
.cnode-title{font-family:var(--font-d);font-size:12px;margin-bottom:3px}
.cnode-desc{font-size:9px;color:var(--dim);line-height:1.4;max-width:11ch}
.cp .cnode-ico{background:rgba(0,0,0,.06);color:var(--c-perf)}.cp .cnode-title{color:var(--c-perf)}
.cs .cnode-ico{background:rgba(75,75,85,.07);color:var(--c-strat)}.cs .cnode-title{color:var(--c-strat)}
.ci .cnode-ico{background:rgba(119,119,119,.07);color:var(--c-init)}.ci .cnode-title{color:var(--c-init)}
.ct .cnode-ico{background:rgba(42,122,191,.07);color:var(--c-tech)}.ct .cnode-title{color:var(--c-tech)}
.cw .cnode-ico{background:var(--red-pale);color:var(--c-weak)}.cw .cnode-title{color:var(--c-weak)}

/* ── COUNT STRIP ── */
.count-strip{display:flex;align-items:center;justify-content:center;gap:0;padding:14px 0;background:var(--light);border-bottom:1px solid var(--mid);overflow-x:auto}
.cs-node{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 24px;white-space:nowrap}
.cs-node .csl{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.cs-node .csn{font-family:var(--font-m);font-size:20px;font-weight:bold}
.cs-arr{color:var(--dimmer);font-size:16px;padding:0 4px}
.cs-p .csl,.cs-p .csn{color:var(--c-perf)}.cs-s .csl,.cs-s .csn{color:var(--c-strat)}
.cs-i .csl,.cs-i .csn{color:var(--c-init)}.cs-t .csl,.cs-t .csn{color:var(--c-tech)}.cs-w .csl,.cs-w .csn{color:var(--c-weak)}

/* ── SECTION HEADERS ── */
section{padding:var(--gap) 0;border-bottom:1px solid var(--mid)}
section:last-child{border-bottom:none}
.sh{display:flex;align-items:flex-start;gap:24px;margin-bottom:40px}
.sh-num{font-family:var(--font-m);font-size:10px;color:var(--dim);letter-spacing:.1em;padding-top:5px;white-space:nowrap}
.sh-text h2{margin-bottom:8px;color:var(--black)}
.sh-text p{font-size:14px;max-width:60ch}
.stag{display:inline-block;padding:3px 8px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.stag-p{background:rgba(0,0,0,.06);color:var(--c-perf)}
.stag-s{background:rgba(75,75,85,.07);color:var(--c-strat)}
.stag-i{background:rgba(119,119,119,.07);color:var(--c-init)}
.stag-t{background:rgba(42,122,191,.07);color:var(--c-tech)}
.stag-w{background:var(--red-pale);color:var(--c-weak)}
.lg{font-size:clamp(1.4rem,2.5vw,2.1rem);letter-spacing:-.012em;line-height:1.2}

/* ── PERFORMANCE ── */
.perf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.perf-card{background:#fff;border:1px solid var(--mid);border-radius:var(--r);padding:20px;transition:var(--ease);position:relative;overflow:hidden}
.perf-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-perf);opacity:.4}
.perf-card:hover{background:var(--light);border-color:#bbb}
.perf-id{font-family:var(--font-m);font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:7px}
.perf-card h3{font-family:var(--font-b);font-size:13px;font-weight:700;color:var(--black);margin-bottom:6px}
.perf-card p{font-size:12px;color:#555;max-width:100%;margin-bottom:10px;line-height:1.55}
.lt{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding-top:10px;border-top:1px solid var(--mid)}
.lt-s{color:var(--c-strat)}.lt-i{color:var(--c-init)}.lt-t{color:var(--c-tech)}.lt-w{color:var(--c-weak)}

/* ── STRATEGY ── */
#strat-sec{background:var(--light)}
.strat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.strat-card{background:#fff;border:1px solid var(--mid);border-radius:var(--r);padding:22px 18px;transition:var(--ease);position:relative;overflow:hidden}
.strat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-strat);opacity:.5}
.strat-card:hover{background:#fafafa;border-color:#bbb}
.strat-because{font-size:10px;color:var(--dim);font-style:italic;margin-bottom:7px;line-height:1.5}
.strat-card h3{font-family:var(--font-b);font-size:14px;font-weight:700;color:var(--c-strat);margin-bottom:6px}
.strat-card p{font-size:12px;color:#555;max-width:100%;margin-bottom:10px;line-height:1.6}
.driver-row{display:flex;flex-wrap:wrap;gap:4px;padding-top:10px;border-top:1px solid var(--mid);margin-bottom:8px}
.driver{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;background:rgba(75,75,85,.06);border:1px solid var(--mid);border-radius:2px;color:var(--grey)}

/* ── INITIATIVES ── */
.ig-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ig-tag{font-size:9px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--c-strat);padding:2px 8px;background:rgba(75,75,85,.07);border:1px solid rgba(75,75,85,.2);border-radius:2px;white-space:nowrap}
.ig-line{flex:1;height:1px;background:var(--mid)}
.init-groups{display:flex;flex-direction:column;gap:24px}
.init-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.init-card{background:#fff;border:1px solid var(--mid);border-radius:var(--r);padding:16px;transition:var(--ease);position:relative;overflow:hidden}
.init-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-init);opacity:.5}
.init-card:hover{background:var(--light);border-color:#bbb}
.init-card h4{font-family:var(--font-b);font-size:12px;font-weight:700;color:var(--c-init);margin-bottom:5px}
.init-card p{font-size:11px;color:#555;max-width:100%;margin-bottom:10px;line-height:1.55}
.init-tl{display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-tech);padding-top:8px;border-top:1px solid var(--mid)}

/* ── TECHNOLOGIES ── */
#tech-sec{background:var(--light)}
.tech-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tech-card{background:#fff;border:1px solid var(--mid);border-radius:var(--r);padding:18px 16px;transition:var(--ease);position:relative;overflow:hidden}
.tech-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-tech);opacity:.4}
.tech-card:hover{background:#fafafa;border-color:#bbb}
.tech-ico{font-size:18px;margin-bottom:7px}
.tech-card h4{font-family:var(--font-b);font-size:12px;font-weight:700;color:var(--c-tech);margin-bottom:5px}
.tech-card p{font-size:11px;color:#555;max-width:100%;line-height:1.5;margin-bottom:10px}
.mat-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.mat-lbl{font-size:8px;color:var(--dim);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.mat-bar{flex:1;height:2px;background:var(--mid);border-radius:2px;overflow:hidden}
.mat-fill{height:100%;background:var(--c-tech);opacity:.6;border-radius:2px}
.tech-tags{display:flex;flex-wrap:wrap;gap:3px;padding-top:7px;border-top:1px solid var(--mid)}
.tech-itag{font-size:8px;color:var(--c-init);background:rgba(119,119,119,.07);border:1px solid rgba(119,119,119,.18);padding:1px 5px;border-radius:1px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.tech-lt{margin-top:6px;display:flex;align-items:center;gap:4px;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-weak)}

/* ── WEAK SIGNALS ── */
.sig-intro{background:var(--red-pale);border:1px solid var(--red-mid);border-radius:var(--r);padding:16px 20px;margin-bottom:28px;display:flex;align-items:flex-start;gap:12px}
.sig-intro-ico{font-size:20px;flex-shrink:0}
.sig-intro p{font-size:13px;color:#555;max-width:100%;line-height:1.65}
.sig-intro strong{color:var(--red)}
.sig-table{width:100%;border-collapse:collapse;font-size:12px}
.sig-table thead tr{border-bottom:1px solid #bbb}
.sig-table thead th{text-align:left;padding:8px 12px;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.sig-table tbody tr{border-bottom:1px solid var(--mid);transition:var(--ease);cursor:default}
.sig-table tbody tr:hover{background:var(--light)}
.sig-table tbody td{padding:12px 12px;vertical-align:top;color:#555}
.sig-name{font-weight:700;color:var(--c-weak);font-size:12px}
.stype{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-top:3px}
.stype-startup{background:rgba(90,180,140,.1);color:#3a9a6a}
.stype-patent{background:rgba(60,120,200,.1);color:#3a70c0}
.stype-pilot{background:rgba(180,130,40,.1);color:#a07020}
.stype-academic{background:rgba(160,80,160,.1);color:#a040a0}
.stype-regulatory{background:var(--red-pale);color:var(--red)}
.stype-xsector{background:rgba(20,160,180,.1);color:#0080a0}
.heat{display:flex;gap:3px;align-items:center;margin-top:3px}
.hd{width:6px;height:6px;border-radius:50%;background:var(--mid)}
.hd.on{background:var(--c-weak)}

/* ── ADJACENCY ── */
#adj-sec{background:var(--light)}
.adj-wrap{overflow-x:auto}
.adj-table{width:100%;border-collapse:collapse;font-size:12px;min-width:780px}
.adj-table thead tr{border-bottom:1px solid #bbb}
.adj-table thead th{text-align:left;padding:8px 14px;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.adj-table tbody tr{border-bottom:1px solid var(--mid);transition:var(--ease)}
.adj-table tbody tr:hover{background:#fff}
.adj-table tbody td{padding:13px 14px;vertical-align:top;color:#555;font-size:12px}
.adj-prob{font-weight:700;color:var(--black);font-size:12px}
.adj-sector{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:rgba(20,160,180,.08);color:#0080a0;border:1px solid rgba(20,160,180,.2)}
.r-now{color:#3a9a6a;font-size:11px;font-weight:700}
.r-mid{color:#a07020;font-size:11px;font-weight:700}
.r-long{color:var(--red);font-size:11px;font-weight:700}

/* ── TAKEAWAYS ── */
.tk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px}
.tk-card{background:#fff;border:1px solid var(--mid);border-radius:var(--r);padding:24px 20px;transition:var(--ease)}
.tk-card:hover{background:var(--light);border-color:#bbb}
.tk-card.hl{background:var(--red-pale);border-color:var(--red-mid)}
.tk-num{font-family:var(--font-m);font-size:24px;color:var(--dim);opacity:.4;line-height:1;margin-bottom:12px;display:block}
.tk-card.hl .tk-num{color:var(--red);opacity:1}
.tk-card h3{font-family:var(--font-d);font-size:16px;color:var(--black);margin-bottom:7px;line-height:1.3}
.tk-card.hl h3{color:var(--red)}
.tk-card p{font-size:12px;max-width:100%;line-height:1.65}

/* ── CONTACTS ── */
.ct-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ct-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ct-search{border:1px solid var(--mid);padding:6px 10px;font-size:12px;outline:none;border-radius:2px;width:200px;background:#fff}
.ct-search:focus{border-color:var(--black)}
.ct-filter{border:1px solid var(--mid);padding:6px 8px;font-size:11px;background:#fff;outline:none;border-radius:2px;cursor:pointer}
.ct-stat{font-size:10px;color:var(--dim);font-family:var(--font-m)}
.ct-msg{padding:14px 16px;background:var(--red-pale);border:1px solid var(--red-mid);color:var(--red);font-size:12px;border-radius:var(--r);margin-bottom:14px}
.ct-table{width:100%;border-collapse:collapse;font-size:12px}
.ct-table thead tr{border-bottom:1px solid #bbb}
.ct-table th{text-align:left;padding:7px 10px;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);background:#fafafa}
.ct-table tbody tr{border-bottom:1px solid var(--mid);transition:var(--ease)}
.ct-table tbody tr:hover{background:var(--light)}
.ct-table td{padding:9px 10px;vertical-align:middle;color:#555}
.c-name{font-weight:700;color:var(--black);font-size:12px}
.c-role{font-size:10px;color:var(--dim);margin-top:1px}
.c-email{font-size:10px;color:var(--dim);font-family:var(--font-m)}
.c-rel{font-size:9px;padding:1px 6px;border-radius:2px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.c-rel.warm{background:rgba(74,154,100,.1);color:#3a8a60;border:1px solid rgba(74,154,100,.2)}
.c-rel.cold{background:var(--red-pale);color:var(--red);border:1px solid var(--red-mid)}
.c-lvl{font-size:9px;color:var(--dim)}
.ck{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1.5px solid var(--mid);background:transparent;cursor:pointer;border-radius:2px;transition:var(--ease);font-size:11px;color:var(--dim)}
.ck:hover{border-color:var(--black)}
.ck.d-li{background:#0077b5;border-color:#0077b5;color:#fff}
.ck.d-em{background:var(--grey);border-color:var(--grey);color:#fff}
.ck.d-ca{background:#3a9a6a;border-color:#3a9a6a;color:#fff}
.prog-wrap{height:2px;background:var(--mid);margin-top:18px;border-radius:1px}
.prog-fill{height:100%;background:var(--black);transition:width .3s;border-radius:1px}
.prog-lbl{font-size:10px;color:var(--dim);margin-top:6px;font-family:var(--font-m)}

/* ── FOOTER ── */
.brief-footer{border-top:1px solid var(--mid);padding:24px 40px;display:flex;justify-content:space-between;align-items:center;max-width:1100px;margin:0 auto}
.bf-brand{font-family:var(--font-d);font-size:12px;color:var(--dim)}
.bf-brand span{color:var(--red)}
.bf-note{font-size:10px;color:var(--dimmer)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{opacity:0}.anim.vis{animation:fadeUp .45s ease forwards}
.d1{animation-delay:.04s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}.d4{animation-delay:.22s}.d5{animation-delay:.28s}

.container{max-width:1100px;margin:0 auto;padding:0 40px}

@media(max-width:1060px){.tech-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.perf-grid{grid-template-columns:1fr 1fr}.strat-grid{grid-template-columns:1fr}.init-row{grid-template-columns:1fr 1fr}.tech-grid{grid-template-columns:1fr 1fr}.tk-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.perf-grid,.init-row,.tech-grid,.tk-grid{grid-template-columns:1fr}}
</style>

// ── PLAN GENERATION ───────────────────────────────────────────────────
async function getPlan(co){
  if(planCache[co.id])return planCache[co.id];
  return generatePlan(co);
}

async function generatePlan(co){
  const key=getKey();
  if(!key)return{error:'No API key. Paste your Anthropic API key in the sidebar.'};
  setLS('Generating with Claude — this takes ~30 seconds…');

  const prompt=`You are a senior FutureBridge analyst. Produce a structured account intelligence brief for ${co.name} (${co.type}, HQ: ${co.hq}, Revenue: ${co.rev}).

The brief follows this chain: Business Performance → Strategy → Initiatives → Technologies → Weak Signals → Cross-industry Adjacency → Executive Takeaways.

Return ONLY valid JSON, no markdown, no extra text:

{
  "hero_subtitle": "One sentence — the single most important commercial argument for why ${co.name} needs technology intelligence right now.",
  "performance": [
    {"id":"${co.id.toUpperCase()}-P1","title":"Pressure title (5-7 words)","description":"2-3 sentences. Specific business pressure or financial outcome. Named, evidenced.","leads_to":"Strategy pillar this drives"}
  ],
  "strategy": [
    {"title":"Strategic pillar title","because":"One sentence: what pressure makes this necessary?","description":"2-3 sentences. What is the company doing and why?","drivers":["Driver A","Driver B","Driver C"],"leads_to":"Initiative group name"}
  ],
  "initiatives": [
    {"group":"Strategy pillar name","items":[
      {"title":"Initiative name","description":"2 sentences. Specific, funded, named where possible.","tech_link":"Primary technology needed"}
    ]}
  ],
  "technologies": [
    {"icon":"emoji","title":"Technology name","description":"2 sentences. Why it matters specifically to ${co.name}.","maturity":0.4,"initiatives":["Initiative"],"leads_to_signal":"Signal to watch"}
  ],
  "weak_signals": [
    {"name":"Named signal — startup, patent cluster, pilot, academic programme","type":"startup|patent|pilot|academic|regulatory|xsector","heat":3,"initiative":"Initiative link","description":"2 sentences. Name a real entity, institution, or filing. Not generic.","implication":"One sentence specific to ${co.name}."}
  ],
  "adjacency": [
    {"problem":"Specific technical problem ${co.name} is solving","sector":"Adjacent industry providing solution","technologies":"Specific technologies from that sector","readiness":"Now to 2 years|2 to 5 years|5 to 10 years","implication":"2 sentences. Commercially specific to ${co.name}."}
  ],
  "takeaways": [
    {"title":"Conclusion title","body":"2-3 sentences following from chain logic. Specific to ${co.name}."}
  ]
}

Requirements — these are hard counts, not suggestions:
- performance: exactly 4 items
- strategy: exactly 4 items  
- initiatives: 2-3 groups, each with 2-3 items
- technologies: exactly 8 items; maturity 0.1–0.9
- weak_signals: exactly 10 items; heat 1–5
- adjacency: exactly 5 rows
- takeaways: exactly 5 items then one item with title "The opportunity for FutureBridge" and body describing the commercial engagement opportunity

Writing style: Bloomberg Intelligence. Short sentences 10-18 words. No consultant language. Commercially specific. Evidence-based.`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:prompt}]})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));return{error:`API error ${r.status}: ${e.error?.message||r.statusText}`}}
    const d=await r.json();
    const txt=d.content.map(b=>b.text||'').join('');
    const clean=txt.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    planCache[co.id]=parsed;
    saveState();
    return parsed;
  }catch(e){return{error:`Generation failed: ${e.message}`}}
}

          </div>
        </div>
        <div id="ct-tbl">${ctHTML}</div>
        <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:${pct}%"></div></div>
        <div class="prog-lbl" id="pl">${done} of ${total} outreach actions complete (${pct}%)</div>
      </div>
    </section>

    <!-- FOOTER -->
    <div class="brief-footer">
      <div class="bf-brand">FutureBridge <span>Advisory</span> · ${co.name} Account Plan</div>
      <div class="bf-note">Confidential. For internal use only. Intelligence generated by Claude · FutureBridge analysis.</div>
    </div>`;

  // animate
  setTimeout(()=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}});
    },{threshold:.1});
    document.querySelectorAll('.anim').forEach(el=>obs.observe(el));
  },100);
}

// ── CONTACTS TABLE ────────────────────────────────────────────────────
let _ctSearch='', _ctFilter='';
function renderContacts(co,contacts,search,flt){
  search=search||''; flt=flt||'';
  let rows=contacts;

  if(search){
    const f=search.toLowerCase();
    rows=rows.filter(c=>(c.name||'').toLowerCase().includes(f)||(c.title||'').toLowerCase().includes(f));
  }

  // filter by field action or level/rel
  if(flt==='li'||flt==='em'||flt==='ca'){
    rows=rows.filter((_,i)=>!ckState[`${co.id}_${contacts.indexOf(_)}_${flt}`]);
  } else if(flt==='CXO'||flt==='Senior Management'||flt==='Mid-Management'){
    rows=rows.filter(c=>c.level===flt);
  } else if(flt==='Warm'||flt==='Cold'){
    rows=rows.filter(c=>c.rel===flt);
  }

  document.getElementById('ct-cnt')&&(document.getElementById('ct-cnt').textContent=rows.length+' contacts');

  if(!rows.length)return`<p style="font-size:13px;color:var(--dim);padding:20px 0">No contacts match the current filter.</p>`;

  const ths=`<tr>
    <th style="width:28px">#</th>
    <th>Name</th>
    <th>Title</th>
    <th>Level</th>
    <th>Email</th>
    <th>Rel</th>
    <th style="width:70px;text-align:center">LinkedIn</th>
    <th style="width:70px;text-align:center">Emailed</th>
    <th style="width:70px;text-align:center">Called</th>
  </tr>`;

  const trs=rows.map(c=>{
    const oi=contacts.indexOf(c);
    const li=ckState[`${co.id}_${oi}_li`]||false;
    const em=ckState[`${co.id}_${oi}_em`]||false;
    const ca=ckState[`${co.id}_${oi}_ca`]||false;
    const rel=c.rel||'';
    const lvl=(c.level||'').replace('-Management','').replace('Business ','Biz ');
    const email=c.email||'';
    return`<tr>
      <td style="color:var(--dim);font-size:10px">${oi+1}</td>
      <td><div class="c-name">${c.name}</div></td>
      <td><div class="c-role">${c.title}</div></td>
      <td><span class="c-lvl">${lvl}</span></td>
      <td><div class="c-email">${email}</div></td>
      <td><span class="c-rel ${rel.toLowerCase()}">${rel}</span></td>
      <td style="text-align:center"><button class="ck ${li?'d-li':''}" onclick="toggle('${co.id}',${oi},'li')" title="${li?'Connected':'Mark LinkedIn connected'}">${li?'✓':''}</button></td>
      <td style="text-align:center"><button class="ck ${em?'d-em':''}" onclick="toggle('${co.id}',${oi},'em')" title="${em?'Emailed':'Mark emailed'}">${em?'✓':''}</button></td>
      <td style="text-align:center"><button class="ck ${ca?'d-ca':''}" onclick="toggle('${co.id}',${oi},'ca')" title="${ca?'Called/Met':'Mark called or met'}">${ca?'✓':''}</button></td>
    </tr>`;
  }).join('');

  return`<table class="ct-table"><thead>${ths}</thead><tbody>${trs}</tbody></table>`;
}

function filterCt(val,id){
  _ctSearch=val;
  const co=COS.find(c=>c.id===id);
  const contacts=getContacts(id);
  const el=document.getElementById('ct-tbl');
  if(el)el.innerHTML=renderContacts(co,contacts,val,_ctFilter);
}
function filterCtBy(val,id){
  _ctFilter=val;
  filterCt(_ctSearch,id);
}

function toggle(coid,idx,field){
  const key=`${coid}_${idx}_${field}`;
  ckState[key]=!ckState[key];
  saveState();
  const co=COS.find(c=>c.id===coid);
  const contacts=getContacts(coid);
  const el=document.getElementById('ct-tbl');
  if(el)el.innerHTML=renderContacts(co,contacts,_ctSearch,_ctFilter);
  const {done,total}=progress(coid);
  const pct=total?Math.round(done/total*100):0;
  const pf=document.getElementById('pf');const pl=document.getElementById('pl');
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=`${done} of ${total} outreach actions complete (${pct}%)`;
  renderSB();
}

async function regenPlan(){
  const btn=document.getElementById('rgbtn');
  if(btn){btn.disabled=true;btn.textContent='Regenerating…'}
  const co=COS.find(c=>c.id===curId);
  delete planCache[co.id];saveState();
  const plan=await generatePlan(co);
  const contacts=getContacts(curId);
  renderBrief(co,plan,contacts);renderSB();
}

loadState();
const sk=localStorage.getItem('fb_v3_key')||'';
document.getElementById('apiKey').value=sk;
renderSB();
</script>
