<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypothesis Heatmap — FutureBridge Signal Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap');

  :root {
    --black: #000000;
    --white: #ffffff;
    --grey: #4B4B55;
    --grey-light: #6a6a74;
    --grey-dark: #2a2a32;
    --red: #F84E5D;
    --purple: #9D7AD2;
    --yellow: #FDCF41;
    --green: #22AE8A;
    --lblue: #48B8E7;
    --blue: #3F43AD;
    --surface: #111114;
    --surface2: #1a1a1f;
    --border: rgba(255,255,255,0.08);
    --border-med: rgba(255,255,255,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    font-size: 14px;
    overflow-x: hidden;
  }

  /* ─── HEADER ─────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 1px solid var(--border-med);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
  }

  .graphic-device {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
  }
  .graphic-device span {
    display: block;
    background: var(--white);
    height: 3px;
    border-radius: 0;
  }
  .graphic-device span:nth-child(1) { width: 28px; }
  .graphic-device span:nth-child(2) { width: 20px; }
  .graphic-device span:nth-child(3) { width: 12px; }

  .header-title {
    flex: 1;
  }
  .header-title h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }
  .header-title p {
    font-size: 10px;
    color: var(--grey-light);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .logotype {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.6;
    flex-shrink: 0;
  }

  /* ─── CONTROLS ────────────────────────────── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--grey-light);
  }

  .chip-group { display: flex; gap: 6px; align-items: center; }

  .chip {
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border-med);
    background: transparent;
    color: var(--grey-light);
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .chip:hover { border-color: var(--white); color: var(--white); }
  .chip.active { background: var(--white); color: var(--black); border-color: var(--white); }
  .chip.chris.active { background: var(--purple); border-color: var(--purple); color: var(--white); }
  .chip.industry.active { background: var(--yellow); border-color: var(--yellow); color: var(--black); }
  .chip.account.active { background: var(--green); border-color: var(--green); color: var(--black); }

  .divider { width: 1px; height: 24px; background: var(--border-med); }

  .sort-group { display: flex; gap: 4px; }
  .sort-btn {
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--grey-light);
    border-radius: 2px;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: var(--white); border-color: var(--border-med); }
  .sort-btn.active { color: var(--white); border-color: var(--white); }

  /* ─── MAIN LAYOUT ─────────────────────────── */
  .main {
    display: flex;
    height: calc(100vh - 112px);
  }

  /* ─── HEATMAP PANE ────────────────────────── */
  .heatmap-pane {
    flex: 1;
    overflow: auto;
    padding: 20px 24px;
    transition: flex 0.3s ease;
  }

  .heatmap-pane.panel-open {
    flex: 0 0 calc(100% - 400px);
  }

  .heatmap-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 3px;
  }

  /* Column headers */
  .heatmap-table thead th {
    padding: 6px 12px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--grey-light);
    text-align: center;
    position: sticky;
    top: 0;
    background: var(--black);
    border-bottom: 1px solid var(--border-med);
    z-index: 10;
  }
  .heatmap-table thead th.tech-col {
    text-align: left;
    width: 200px;
    min-width: 160px;
  }
  .heatmap-table thead th.overlap-col {
    width: 60px;
    text-align: center;
  }

  .col-chris { color: var(--purple) !important; }
  .col-industry { color: var(--yellow) !important; }
  .col-account { color: var(--green) !important; }

  /* Row */
  .heatmap-row {
    transition: opacity 0.2s;
  }
  .heatmap-row.hidden { display: none; }
  .heatmap-row.dimmed { opacity: 0.3; }

  /* Tech cell */
  .tech-cell {
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 2px 0 0 2px;
    vertical-align: middle;
  }

  .tech-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.3;
  }
  .tech-meta {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    align-items: center;
  }
  .tech-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 1px;
  }
  .badge-energy { background: rgba(72,184,231,0.2); color: var(--lblue); }
  .badge-mobility { background: rgba(157,122,210,0.2); color: var(--purple); }
  .badge-both { background: rgba(253,207,65,0.2); color: var(--yellow); }
  .tech-category {
    font-size: 9px;
    color: var(--grey-light);
  }

  /* Overlap cell */
  .overlap-cell {
    text-align: center;
    vertical-align: middle;
    padding: 0 8px;
    background: var(--surface);
  }

  .overlap-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
  }
  .overlap-1 { background: rgba(63,67,173,0.3); color: var(--blue); border: 1px solid rgba(63,67,173,0.5); }
  .overlap-2 { background: rgba(253,207,65,0.25); color: var(--yellow); border: 1px solid rgba(253,207,65,0.5); }
  .overlap-3 { background: rgba(248,78,93,0.2); color: var(--red); border: 1px solid rgba(248,78,93,0.5); }

  /* Register cells */
  .reg-cell {
    padding: 4px 6px;
    text-align: center;
    vertical-align: middle;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    width: 120px;
    min-width: 100px;
    background: var(--surface);
  }
  .reg-cell:hover { filter: brightness(1.15); transform: scale(1.01); }
  .reg-cell.empty {
    cursor: default;
  }
  .reg-cell.empty:hover { filter: none; transform: none; }

  .cell-inner {
    border-radius: 2px;
    padding: 8px 10px;
    height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    position: relative;
    overflow: hidden;
  }
  .cell-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.12;
    border-radius: 2px;
  }

  /* Probability color coding via secondary palette */
  .prob-very-high .cell-inner { border: 1px solid rgba(34,174,138,0.5); }
  .prob-very-high .cell-inner::before { background: var(--green); opacity: 0.18; }
  .prob-high .cell-inner { border: 1px solid rgba(253,207,65,0.4); }
  .prob-high .cell-inner::before { background: var(--yellow); opacity: 0.15; }
  .prob-mid .cell-inner { border: 1px solid rgba(72,184,231,0.35); }
  .prob-mid .cell-inner::before { background: var(--lblue); opacity: 0.12; }
  .prob-low .cell-inner { border: 1px solid rgba(157,122,210,0.3); }
  .prob-low .cell-inner::before { background: var(--purple); opacity: 0.1; }
  .prob-empty .cell-inner { border: 1px solid var(--border); background: transparent; }

  .cell-prob {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: var(--white);
    position: relative;
  }
  .prob-very-high .cell-prob { color: var(--green); }
  .prob-high .cell-prob { color: var(--yellow); }
  .prob-mid .cell-prob { color: var(--lblue); }
  .prob-low .cell-prob { color: var(--purple); }

  .cell-prob sup {
    font-size: 9px;
    font-weight: 500;
    opacity: 0.7;
  }

  .cell-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    position: relative;
  }
  .cell-count {
    font-size: 9px;
    color: var(--grey-light);
  }
  .velocity-chip {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 1px;
  }
  .vel-rising { background: rgba(34,174,138,0.2); color: var(--green); }
  .vel-stable { background: rgba(255,255,255,0.08); color: var(--grey-light); }
  .vel-falling { background: rgba(248,78,93,0.2); color: var(--red); }

  .empty-dash {
    font-size: 16px;
    color: var(--grey-dark);
    position: relative;
  }

  /* Account breakdown mini-bars */
  .acc-bars {
    display: flex;
    gap: 1px;
    margin-top: 2px;
    justify-content: center;
    position: relative;
    width: 100%;
  }
  .acc-bar-item {
    height: 3px;
    border-radius: 1px;
    flex: 1;
    max-width: 8px;
  }

  /* Last cell border radius */
  .heatmap-table td:last-child {
    border-radius: 0 2px 2px 0;
  }

  /* Sector group labels */
  .sector-header td {
    padding: 16px 12px 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--grey-light);
    border-top: 1px solid var(--border);
    background: transparent;
  }

  /* ─── DETAIL PANEL ────────────────────────── */
  .detail-panel {
    width: 0;
    overflow: hidden;
    border-left: 1px solid var(--border);
    transition: width 0.3s ease;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  .detail-panel.open {
    width: 420px;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .panel-header-info { flex: 1; min-width: 0; }
  .panel-tech-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
  }
  .panel-register-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .panel-register-label.chris { color: var(--purple); }
  .panel-register-label.industry { color: var(--yellow); }
  .panel-register-label.account { color: var(--green); }

  .panel-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--grey-light);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 2px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .panel-close:hover { border-color: var(--white); color: var(--white); }

  .panel-stats {
    padding: 12px 20px;
    display: flex;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-item { flex: 1; }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    color: var(--grey-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Entity filter for account view */
  .entity-filter {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: none;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .entity-filter.visible { display: flex; gap: 4px; flex-wrap: wrap; }
  .entity-chip {
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    color: var(--grey-light);
    white-space: nowrap;
    transition: all 0.12s;
    background: transparent;
  }
  .entity-chip:hover { border-color: var(--white); color: var(--white); }
  .entity-chip.active { background: var(--grey); border-color: var(--grey); color: var(--white); }

  .panel-bets {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
  }

  /* Hypothesis cards */
  .bet-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .bet-card:hover { border-color: var(--border-med); }
  .bet-title {
    font-size: 12px;
    color: var(--white);
    line-height: 1.5;
    font-weight: 400;
  }
  .bet-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .bet-prob {
    font-size: 15px;
    font-weight: 700;
  }
  .bet-delta {
    font-size: 10px;
    font-weight: 500;
  }
  .delta-up { color: var(--green); }
  .delta-flat { color: var(--grey-light); }
  .delta-down { color: var(--red); }

  .bet-entity-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 1px;
    color: var(--grey-light);
  }

  /* Step progress */
  .step-bar {
    display: flex;
    gap: 2px;
    margin-top: 6px;
  }
  .step-dot {
    height: 3px;
    flex: 1;
    border-radius: 1px;
    background: var(--border);
  }
  .step-dot.done { background: var(--green); }
  .step-dot.current { background: var(--lblue); }

  .velocity-tag {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 1px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .v-rising { background: rgba(34,174,138,0.15); color: var(--green); }
  .v-stable { background: rgba(255,255,255,0.06); color: var(--grey-light); }
  .v-falling { background: rgba(248,78,93,0.15); color: var(--red); }

  /* ─── AI QUERY PANEL ─────────────────────── */
  .ai-panel {
    border-top: 1px solid var(--border-med);
    background: var(--surface);
    flex-shrink: 0;
  }

  .ai-toggle {
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--white);
    width: 100%;
    text-align: left;
  }
  .ai-toggle:hover { background: rgba(255,255,255,0.02); }

  .ai-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .ai-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .ai-body {
    display: none;
    padding: 0 24px 16px;
  }
  .ai-body.open { display: block; }

  .ai-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ai-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border-med);
    color: var(--white);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }
  .ai-input:focus { border-color: var(--red); }
  .ai-input::placeholder { color: var(--grey-light); }

  .ai-btn {
    padding: 8px 16px;
    background: var(--red);
    color: var(--white);
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .ai-btn:hover { opacity: 0.85; }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .ai-presets {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .preset-btn {
    padding: 3px 8px;
    font-size: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--grey-light);
    border-radius: 2px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }
  .preset-btn:hover { border-color: var(--border-med); color: var(--white); }

  .ai-response {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--white);
    display: none;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .ai-response.visible { display: block; }
  .ai-response.loading { color: var(--grey-light); font-style: italic; }

  .ai-context-info {
    font-size: 10px;
    color: var(--grey-light);
    margin-bottom: 8px;
  }
  .ai-context-info strong { color: var(--red); }

  /* ─── LEGEND ──────────────────────────────── */
  .legend {
    display: flex;
    gap: 16px;
    padding: 0 0 0 12px;
    align-items: center;
    margin-left: auto;
  }
  .legend-item {
    display: flex;
    gap: 5px;
    align-items: center;
    font-size: 10px;
    color: var(--grey-light);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
  }

  /* ─── SCROLLBAR ───────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--grey); border-radius: 2px; }

  /* ─── RESPONSIVE ──────────────────────────── */
  @media (max-width: 900px) {
    .detail-panel.open { width: 100%; position: absolute; right: 0; top: 0; height: 100%; z-index: 50; }
  }
</style>
</head>
<body>

<header>
  <div class="graphic-device">
    <span></span><span></span><span></span>
  </div>
  <div class="header-title">
    <h1>Hypothesis Heatmap</h1>
    <p>Signal Engine · Technology × Hypothesis × Probability</p>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> >60%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> 45–60%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--lblue)"></div> 30–45%</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> <30%</div>
  </div>
  <div class="logotype">FutureBridge</div>
</header>

<div class="controls">
  <span class="control-label">Sector</span>
  <div class="chip-group">
    <button class="chip active" onclick="filterSector('ALL',this)">All</button>
    <button class="chip" onclick="filterSector('ENERGY',this)">Energy</button>
    <button class="chip" onclick="filterSector('MOBILITY',this)">Mobility</button>
    <button class="chip" onclick="filterSector('BOTH',this)">Dual</button>
  </div>

  <div class="divider"></div>
  <span class="control-label">Overlap</span>
  <div class="chip-group">
    <button class="chip active" onclick="filterOverlap(0,this)">All</button>
    <button class="chip" onclick="filterOverlap(3,this)">3 registers</button>
    <button class="chip" onclick="filterOverlap(2,this)">2+ registers</button>
  </div>

  <div class="divider"></div>
  <span class="control-label">Sort</span>
  <div class="sort-group">
    <button class="sort-btn active" onclick="sortBy('overlap',this)">Overlap</button>
    <button class="sort-btn" onclick="sortBy('prob',this)">Probability</button>
    <button class="sort-btn" onclick="sortBy('velocity',this)">Velocity</button>
  </div>
</div>

<div class="main" id="main">
  <div class="heatmap-pane" id="heatmapPane">
    <table class="heatmap-table">
      <thead>
        <tr>
          <th class="tech-col">Technology</th>

// ─── HELPERS ────────────────────────────────────────────────────────────────
function probClass(prob) {
  if (!prob && prob !== 0) return 'prob-empty';
  if (prob >= 60) return 'prob-very-high';
  if (prob >= 45) return 'prob-high';
  if (prob >= 30) return 'prob-mid';
  return 'prob-low';
}

function probColor(prob) {
  if (prob >= 60) return 'var(--green)';
  if (prob >= 45) return 'var(--yellow)';
  if (prob >= 30) return 'var(--lblue)';
  return 'var(--purple)';
}

function velClass(dir, score) {
  if (dir === 'rising' || score > 7) return 'vel-rising';
  if (dir === 'falling') return 'vel-falling';
  return 'vel-stable';
}

function velIcon(dir) {
  if (dir === 'rising') return '↑';
  if (dir === 'falling') return '↓';
  return '→';
}

function avgVelocityDir(bets) {
  const scores = bets.map(b => b.velocity_score || 0);
  const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
  if (avg > 7) return 'rising';
  if (avg < 5) return 'falling';
  return 'stable';
}

// ─── RENDER CELL ────────────────────────────────────────────────────────────
function renderCell(summary, register, techId) {
  if (!summary) {
    return `<td class="reg-cell empty"><div class="cell-inner prob-empty"><span class="empty-dash">—</span></div></td>`;
  }
  const pc = probClass(summary.avg_prob);
  const vc = velClass('stable', summary.avg_velocity);
  const vi = summary.avg_velocity > 7 ? '↑' : summary.avg_velocity < 5 ? '↓' : '→';
  const delta = summary.prob_delta;
  const deltaStr = delta > 0 ? `+${delta.toFixed(0)}` : delta < 0 ? `${delta.toFixed(0)}` : '=';
  const deltaClass = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-flat';

  return `<td class="reg-cell ${pc}" onclick="openPanel('${techId}','${register}')" data-tech="${techId}" data-reg="${register}">
    <div class="cell-inner">
      <div class="cell-prob">${Math.round(summary.avg_prob)}<sup>%</sup></div>
      <div class="cell-meta">
        <span class="cell-count">${summary.count} hyp</span>
        <span class="velocity-chip ${vc}">${vi} ${summary.avg_velocity.toFixed(1)}</span>
      </div>
    </div>
  </td>`;
}

// ─── RENDER HEATMAP ─────────────────────────────────────────────────────────
function renderHeatmap() {
  let rows = [...RAW.heatmap_rows];

  // Filter
  if (currentSector !== 'ALL') {
    rows = rows.filter(r => r.tech.sector === currentSector || r.tech.sector === 'BOTH');
  }
  if (currentOverlap > 0) {
    rows = rows.filter(r => r.overlap >= currentOverlap);
  }

  // Sort
  if (currentSort === 'prob') {
    rows.sort((a,b) => {
      const ap = (a.account?.avg_prob||0) + (a.chris?.avg_prob||0) + (a.industry?.avg_prob||0);
      const bp = (b.account?.avg_prob||0) + (b.chris?.avg_prob||0) + (b.industry?.avg_prob||0);
      return bp - ap;
    });
  } else if (currentSort === 'velocity') {
    rows.sort((a,b) => {
      const av = Math.max(a.account?.avg_velocity||0, a.chris?.avg_velocity||0, a.industry?.avg_velocity||0);
      const bv = Math.max(b.account?.avg_velocity||0, b.chris?.avg_velocity||0, b.industry?.avg_velocity||0);
      return bv - av;
    });
  } else {
    rows.sort((a,b) => b.overlap - a.overlap || (b.account?.avg_prob||0) - (a.account?.avg_prob||0));
  }

  const body = document.getElementById('heatmapBody');
  let html = '';
  let lastOverlap = -1;

  rows.forEach(r => {
    const sectorClass = r.tech.sector === 'ENERGY' ? 'badge-energy' : r.tech.sector === 'MOBILITY' ? 'badge-mobility' : 'badge-both';

    // Section divider by overlap group
    if (currentSort === 'overlap' && r.overlap !== lastOverlap) {
      const label = r.overlap === 3 ? 'Triple convergence — all three registers' : r.overlap === 2 ? 'Dual convergence — two registers' : 'Single register';
      html += `<tr class="sector-header"><td colspan="6">${label}</td></tr>`;
      lastOverlap = r.overlap;
    }

    // Account mini-bar for entity breakdown
    let accEntityBars = '';
    if (r.account && r.account_by_entity) {
      const entities = Object.entries(r.account_by_entity);
      const maxProb = Math.max(...entities.map(([,v]) => v?.avg_prob||0));
      accEntityBars = `<div class="acc-bars">${entities.slice(0,12).map(([eid,v]) => {
        if (!v) return '';
        const h = Math.max(2, Math.round((v.avg_prob/100)*100));
        const c = probColor(v.avg_prob);
        return `<div class="acc-bar-item" style="background:${c};opacity:0.6" title="${eid}: ${v.avg_prob}%"></div>`;
      }).join('')}</div>`;
    }

    // Account cell (extended with entity bars)
    let accCell = '';
    if (!r.account) {
      accCell = `<td class="reg-cell empty" colspan="1"><div class="cell-inner prob-empty"><span class="empty-dash">—</span></div></td>`;
    } else {
      const pc = probClass(r.account.avg_prob);
      const vi = r.account.avg_velocity > 7 ? '↑' : r.account.avg_velocity < 5 ? '↓' : '→';
      const vc = r.account.avg_velocity > 7 ? 'vel-rising' : r.account.avg_velocity < 5 ? 'vel-falling' : 'vel-stable';
      accCell = `<td class="reg-cell ${pc}" onclick="openPanel('${r.tech.tech_id}','ACCOUNT')" colspan="1">
        <div class="cell-inner" style="height:70px">
          <div class="cell-prob">${Math.round(r.account.avg_prob)}<sup>%</sup></div>
          <div class="cell-meta">
            <span class="cell-count">${r.account.count} hyp</span>
            <span class="velocity-chip ${vc}">${vi} ${r.account.avg_velocity.toFixed(1)}</span>
          </div>
          ${accEntityBars}
        </div>
      </td>`;
    }

    html += `<tr class="heatmap-row" data-tech="${r.tech.tech_id}" data-sector="${r.tech.sector}" data-overlap="${r.overlap}">
      <td class="tech-cell">
        <div class="tech-name">${r.tech.name}</div>
        <div class="tech-meta">
          <span class="tech-badge ${sectorClass}">${r.tech.sector}</span>
          <span class="tech-category">${r.tech.category}</span>
        </div>
      </td>
      <td class="overlap-cell">
        <span class="overlap-badge overlap-${r.overlap}" title="${r.overlap} register${r.overlap>1?'s':''}">${r.overlap}</span>
      </td>
      ${renderCell(r.chris, 'CHRIS', r.tech.tech_id)}
      ${renderCell(r.industry, 'INDUSTRY', r.tech.tech_id)}
      ${accCell}
    </tr>`;
  });

  body.innerHTML = html;
}

function sortBy(key, btn) {

function renderBets(techId, register, entityFilter) {
  const row = RAW.heatmap_rows.find(r => r.tech.tech_id === techId);
  if (!row) return;

  let betIds = [];
  if (register === 'CHRIS') betIds = row.chris?.bet_ids || [];
  else if (register === 'INDUSTRY') betIds = row.industry?.bet_ids || [];
  else {
    if (entityFilter && row.account_by_entity[entityFilter]) {
      betIds = row.account_by_entity[entityFilter].bet_ids;
    } else {
      betIds = row.account?.bet_ids || [];
    }
  }

  const bets = betIds.map(id => {
    const b = RAW.bet_lookup[id];
    return b ? { ...b, bet_id: id } : null;
  }).filter(Boolean);

  bets.sort((a,b) => b.probability - a.probability);

  const container = document.getElementById('panelBets');
  if (!bets.length) {
    container.innerHTML = '<div style="color:var(--grey-light);font-size:12px;padding:12px 0">No hypotheses for this selection.</div>';
    return;
  }

  container.innerHTML = bets.map(b => {
    const delta = b.probability - b.prev_probability;
    const deltaStr = delta > 0 ? `+${delta}pp` : delta < 0 ? `${delta}pp` : '=';
    const deltaClass = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-flat';
    const vClass = b.velocity_direction === 'rising' ? 'v-rising' : b.velocity_direction === 'falling' ? 'v-falling' : 'v-stable';
    const vIcon = b.velocity_direction === 'rising' ? '↑' : b.velocity_direction === 'falling' ? '↓' : '→';

    // Step progress
    const steps = b.total_steps || 0;
    const done = b.current_step || 0;
    const stepDots = steps > 0 ? `<div class="step-bar">` +
      Array.from({length: steps}, (_,i) =>
        `<div class="step-dot ${i < done ? 'done' : i === done ? 'current' : ''}"></div>`
      ).join('') + `</div>` : '';

    const entityTag = b.entity_id ? `<span class="bet-entity-tag">${b.entity_id}</span>` : '';

    return `<div class="bet-card">
      <div class="bet-title">${b.title}</div>
      <div class="bet-row">
        <span class="bet-prob" style="color:${probColor(b.probability)}">${b.probability}%</span>
        <span class="bet-delta ${deltaClass}">${deltaStr}</span>
        <span class="velocity-tag ${vClass}">${vIcon} ${b.velocity_score || '—'}</span>
        ${entityTag}
        ${b.time_horizon ? `<span style="font-size:9px;color:var(--grey-light);margin-left:auto">${b.time_horizon}</span>` : ''}
      </div>
      ${stepDots}
    </div>`;
  }).join('');
}

function closePanel() {
  selectedCell = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('heatmapPane').classList.remove('panel-open');
}

// ─── AI PANEL ────────────────────────────────────────────────────────────────
function toggleAI() {
  aiOpen = !aiOpen;
  document.getElementById('aiBody').classList.toggle('open', aiOpen);
  document.getElementById('aiToggleIcon').textContent = aiOpen ? '▼' : '▲';
}

function setPreset(btn) {
  document.getElementById('aiInput').value = btn.textContent;
}

function updateAIContext(techName, register, count) {
  const info = document.getElementById('aiContextInfo');
  info.innerHTML = `Context: <strong>${techName}</strong> · ${register} register · ${count} hypotheses selected. Querying against all 176 hypotheses.`;
}

async function runAI() {
  const input = document.getElementById('aiInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('aiBtn');
  const responseEl = document.getElementById('aiResponse');
  btn.disabled = true;
  btn.textContent = 'Thinking…';
  responseEl.className = 'ai-response visible loading';
  responseEl.textContent = 'Analysing hypothesis landscape…';

  // Build context from current selection
  let contextBets = RAW.all_bets;
  let contextNote = 'Full database: 176 hypotheses across CHRIS, INDUSTRY, and ACCOUNT registers.';
  if (selectedCell) {
    const row = RAW.heatmap_rows.find(r => r.tech.tech_id === selectedCell.techId);
    if (row) {
      contextNote = `Selected: ${row.tech.name} · ${selectedCell.register} register.`;
    }
  }

  // Summarise bets for context (keep it tight)
  const betSummary = contextBets.map(b =>
    `[${b.register}${b.entity_id ? '/'+b.entity_id : ''}] ${b.title} | P=${b.probability}% (prev ${b.prev_probability}%) | V=${b.velocity_score} ${b.velocity_direction}`
  ).join('\n');

  const heatmapSummary = RAW.heatmap_rows.map(r =>
    `${r.tech.name}: overlap=${r.overlap}/3 | CHRIS=${r.chris ? Math.round(r.chris.avg_prob)+'%' : '—'} | INDUSTRY=${r.industry ? Math.round(r.industry.avg_prob)+'%' : '—'} | ACCOUNT=${r.account ? Math.round(r.account.avg_prob)+'%' : '—'}`
  ).join('\n');

  const systemPrompt = `You are a senior industry analyst at FutureBridge Advisory. You are interrogating the Signal Engine hypothesis database — 176 strategic hypotheses across three registers (CHRIS: personal conviction bets, INDUSTRY: macro market hypotheses, ACCOUNT: company-specific bets for Shell, BP, Halliburton, VW, Mercedes, and others).

Each hypothesis has a probability score (%), velocity score (1-10), velocity direction, and step ladder progress.

Write like The Economist or Bloomberg Intelligence. Short sentences. Commercially grounded. No consultant clichés. No symmetrical AI rhetoric.

TECHNOLOGY HEATMAP (overlap across registers):
${heatmapSummary}

ALL HYPOTHESES:
${betSummary}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: input }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || 'No response.';
    responseEl.className = 'ai-response visible';
    responseEl.textContent = text;
  } catch (err) {
    responseEl.className = 'ai-response visible';
    responseEl.textContent = 'Error: ' + err.message;
  }

  btn.disabled = false;
  btn.textContent = 'Analyse';
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if (e.key === 'Enter' && document.activeElement.id === 'aiInput') runAI();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
renderHeatmap();
</script>
</body>
</html>
