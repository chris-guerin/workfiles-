databases:
  signal_engine_pe:
    allow_execute_sql: true

permissions:
  insert-row:
    allow: true
  update-row:
    allow: true
  create-table:
    allow: true

plugins:
  datasette-auth-tokens:
    tokens:
      - token: fb-signals-2026
        actor:
          id: signal-engine
          _all:
            insert-row: true
            update-row: true
            create-table: true
