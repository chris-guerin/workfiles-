services:
  - type: web
    name: futurbridge-signals
    runtime: python
    buildCommand: pip install datasette
    startCommand: datasette serve signal_engine_pe.db --host 0.0.0.0 --port $PORT --cors --setting max_returned_rows 500 --setting sql_time_limit_ms 5000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
